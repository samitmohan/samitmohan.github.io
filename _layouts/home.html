---
layout: default
---

<div class="home">
  {{ content }}

  {%- assign regular_posts = site.posts | where_exp: "post", "post.ongoing != true" -%}
  {%- if regular_posts.size > 0 -%}
    <ul class="post-list-flat">
      {%- for post in regular_posts -%}
      <li>
        <span class="post-date-flat">{{ post.date | date: "%Y-%m-%d" }}</span>
        <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
      </li>
      {%- endfor -%}
    </ul>
  {%- endif -%}
</div>
