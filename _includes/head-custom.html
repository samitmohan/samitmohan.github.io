<!-- Prevent FOUC: apply dark mode before any rendering -->
<script>
(function(){var s=localStorage.getItem('theme');if(s==='dark'||(!s&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark-mode')})();
</script>

<!-- Lazy-initialize inline widgets only when scrolled into view -->
<script>
window.lazyWidget=function(id,fn){var el=document.getElementById(id);if(!el)return;if('IntersectionObserver' in window){var io=new IntersectionObserver(function(entries){if(entries[0].isIntersecting){io.disconnect();fn();}},{rootMargin:'200px'});io.observe(el);}else{fn();}};
</script>

<!-- Favicon -->
<link rel="icon" href="/assets/images/icon.svg" type="image/svg+xml">

<!-- Google Fonts: Inter + JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>

<link rel="stylesheet" href="/assets/css/override.css">
<script src="/assets/js/utils.js" defer></script>

<!-- MathJax: only load on posts that use math -->
{%- if page.math %}
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      processEnvironments: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{%- endif %}
